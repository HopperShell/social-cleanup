<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>Social Cleanup</h1>
    <p class="subtitle">Facebook Activity Cleaner</p>

    <div id="status-bar" class="status idle">
      <span id="status-icon">●</span>
      <span id="status-text">Idle</span>
    </div>

    <div class="nav-section">
      <label class="nav-label">Open Activity Log:</label>
      <div class="nav-buttons">
        <button id="nav-posts" class="btn btn-nav">Posts</button>
        <button id="nav-comments" class="btn btn-nav">Comments</button>
        <button id="nav-reactions" class="btn btn-nav">Reactions</button>
      </div>
      <p id="current-page" class="nav-hint">Not on Activity Log</p>
    </div>

    <div class="date-filter">
      <label for="delete-before">Only delete items older than:</label>
      <input type="date" id="delete-before">
      <p class="date-hint">Leave empty to delete everything</p>
    </div>

    <div class="controls">
      <button id="btn-start" class="btn btn-primary">Start Cleanup</button>
      <button id="btn-pause" class="btn btn-warning" hidden>Pause</button>
      <button id="btn-resume" class="btn btn-primary" hidden>Resume</button>
      <button id="btn-stop" class="btn btn-danger" hidden>Stop</button>
    </div>

    <div class="stats" id="stats" hidden>
      <div class="stat-row">
        <span class="stat-label">Posts deleted:</span>
        <span id="stat-posts">0</span>
        <span class="stat-sub">(<span id="stat-photos">0</span> photos saved)</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Comments deleted:</span>
        <span id="stat-comments">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Reactions removed:</span>
        <span id="stat-reactions">0</span>
      </div>
    </div>

    <div class="log-container" id="log-container" hidden>
      <h3>Activity Log</h3>
      <div id="log" class="log"></div>
    </div>

    <div class="debug-section">
      <button id="btn-debug" class="btn btn-debug">Dump Debug Log</button>
      <p class="debug-hint">Saves diagnostic info to Downloads/social-cleanup-debug.json</p>
    </div>
  </div>

  <script src="../shared/constants.js"></script>
  <script src="../shared/messages.js"></script>
  <script src="popup.js"></script>
</body>
</html>
